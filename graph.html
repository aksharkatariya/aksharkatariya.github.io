<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akshar Katariya — Work as a Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: #F4EEE4;
      color: #1A1714;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 2.5rem 1.5rem 4rem;
    }

    .page { max-width: 780px; margin: 0 auto; }

    .back-link {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7A7268;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 2.5rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: #B94A22; }

    .page-header { margin-bottom: 1.8rem; }

    .page-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 2.8rem);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.45rem;
    }
    .page-header h1 em { font-style: italic; color: #B94A22; }

    .page-header p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7A7268;
    }

    /* LEGEND */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem 1.6rem;
      margin-bottom: 1.4rem;
      padding-bottom: 1.4rem;
      border-bottom: 1px solid #D4C9B8;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7A7268;
    }
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* HINT */
    .hint {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1A1714;
      margin-bottom: 1.8rem;
      font-weight: 400;
    }
    .hint-action { text-decoration: underline; }

    /* GRAPH */
    .graph-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    #gitgraph { display: block; }
    .node-group { cursor: pointer; }

    /* POPUP */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(26,23,20,0.3);
      z-index: 90;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.visible { opacity: 1; pointer-events: all; }

    .popup {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -48%) scale(0.97);
      background: #F4EEE4;
      border: 1px solid #D4C9B8;
      padding: 1.8rem 2rem 1.6rem;
      max-width: 390px;
      width: 90vw;
      z-index: 100;
      box-shadow: 0 12px 48px rgba(26,23,20,0.14);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .popup.visible {
      opacity: 1; pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }

    .popup-branch-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.45rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .popup-branch-dot {
      width: 8px; height: 8px;
      border-radius: 50%; flex-shrink: 0;
    }

    .popup-title {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55rem;
      font-weight: 600;
      line-height: 1.15;
      color: #1A1714;
      text-decoration: none;
      margin-bottom: 0.7rem;
      transition: color 0.15s;
    }
    .popup-title:hover { color: #B94A22; }

    .popup-desc {
      font-size: 0.875rem;
      color: #1A1714;
      line-height: 1.72;
      margin-bottom: 1.1rem;
      font-weight: 300;
    }

    .popup-links { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    .popup-link {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #1A1714;
      text-decoration: none;
      border: 1px solid #1A1714;
      padding: 0.25rem 0.6rem;
      border-radius: 2px;
      transition: all 0.15s;
    }
    .popup-link:hover { background: #B94A22; border-color: #B94A22; color: #F4EEE4; }

    .popup-close {
      position: absolute; top: 0.9rem; right: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7A7268;
      background: none; border: none;
      cursor: pointer;
      transition: color 0.15s;
      padding: 0.2rem;
    }
    .popup-close:hover { color: #B94A22; }
  </style>
</head>
<body>

<div class="page">
  <a href="index.html" class="back-link">← Portfolio</a>

  <div class="page-header">
    <h1>Work as a <em>Graph</em></h1>
    <p>Projects as commits · Themes as branches · Cross-domain work as merges</p>
  </div>

  <div class="legend" id="legend"></div>

  <p class="hint"><span class="hint-action">Click any node</span> to explore the project</p>

  <div class="graph-wrap">
    <svg id="gitgraph" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div class="overlay" id="overlay"></div>

<div class="popup" id="popup">
  <button class="popup-close" id="popup-close">Close ×</button>
  <div class="popup-branch-label" id="popup-branch">
    <span class="popup-branch-dot" id="popup-dot"></span>
    <span id="popup-branch-text"></span>
  </div>
  <a class="popup-title" id="popup-title" href="#" target="_blank" rel="noopener"></a>
  <div class="popup-desc" id="popup-desc"></div>
  <div class="popup-links" id="popup-links"></div>
</div>

<script>
  // ── BRANCHES ────────────────────────────────────────────
  const COLORS = {
    dataviz:   '#2E6B8A',
    climate:   '#3D7A5C',
    civictech: '#B94A22',
    chatbot:   '#A06820',
    nlp:       '#7B5085',
    policy:    '#5C6070',
  };

  const BRANCH_LABELS = {
    dataviz:   'Data Viz',
    climate:   'Climate',
    civictech: 'Civic Tech',
    chatbot:   'Chatbot',
    nlp:       'NLP / Text',
    policy:    'Policy',
  };

  // Column x positions — 60px apart
  const BX = {
    dataviz:   50,
    climate:   110,
    civictech: 170,
    chatbot:   230,
    nlp:       290,
    policy:    350,
  };

  const START_Y  = 70;
  const ROW_H    = 72;
  const NODE_R   = 7;
  const MERGE_R  = 5;
  const LABEL_X  = 395;
  const SVG_W    = 760;

  // ── PROJECT DATA ─────────────────────────────────────────
  const commits = [
    {
      row: 0, branch: 'chatbot', merges: ['civictech', 'nlp'],
      title: 'Khitaab',
      url: 'https://t.me/farmfinance_bot',
      desc: 'A WhatsApp and SMS chatbot turning a farmer\'s spoken or typed transactions, in any language, into a bank-ready financial record. Breaks the informal credit cycle for smallholder farmers who fall back on moneylenders at ~25% when formal credit at 8–9% stays out of reach.',
      links: [
        { label: 'Chatbot', url: 'https://t.me/farmfinance_bot' },
        { label: 'Pitch Video', url: 'https://drive.google.com/file/d/1hLonNY7NS3-krtFU9zuOVvkBdd7H9-ZX/view' },
      ]
    },
    {
      row: 1, branch: 'dataviz', merges: [],
      title: 'HexMap India',
      url: 'https://hexmapindia.streamlit.app/',
      desc: 'First hexagonal tile map system built for Indian states. A cartographic technique standard in Western data journalism that had never been adapted for India. Built a full website to make the format accessible to journalists, researchers, and designers.',
      links: [
        { label: 'Website', url: 'https://hexmapindia.streamlit.app/' },
        { label: 'The Problem', url: 'https://www.instagram.com/reel/DQscb45EaNM/' },
        { label: 'How I Built It', url: 'https://www.instagram.com/reel/DRZ6BwAkWP0/' },
      ]
    },
    {
      row: 2, branch: 'climate', merges: ['dataviz'],
      title: 'Climate Visualization Challenge',
      url: 'https://climatevizproject.netlify.app',
      desc: 'Makes temperature anomalies visceral through 3D plots, SVG graphics, and audio. Moves climate communication beyond static charts into something emotionally legible — designed for diverse audiences who may not already care about the data.',
      links: [
        { label: 'Project', url: 'https://climatevizproject.netlify.app' },
      ]
    },
    {
      row: 3, branch: 'climate', merges: ['dataviz', 'policy'],
      title: 'What in the F-gases?',
      url: 'https://uchicago-mscapp-projects.github.io/projects/what-in-the-f-gases/',
      desc: 'Interactive Altair visualizations exposing fluorinated gas emission disparities across countries, development status, and industries. Key finding: retail refrigeration is a quietly rising culprit. Built to inform targeted mitigation policy.',
      links: [
        { label: 'Project', url: 'https://uchicago-mscapp-projects.github.io/projects/what-in-the-f-gases/' },
        { label: 'Code', url: 'https://github.com/aksharkatariya/static_project' },
      ]
    },
    {
      row: 4, branch: 'civictech', merges: ['policy'],
      title: 'Transit & Food Access, Ashburn',
      url: 'https://drive.google.com/file/d/1gOGuVAa963Hq6NIvC5WqqLx9csi-Rvb7/view',
      desc: 'GIS-based market report on Ashburn, Chicago, a neighborhood at the edge of both a grocery desert and a transit gap. Maps food service accessibility, examines cycling and transit infrastructure, and offers concrete equity recommendations.',
      links: [
        { label: 'Report', url: 'https://drive.google.com/file/d/1gOGuVAa963Hq6NIvC5WqqLx9csi-Rvb7/view' },
      ]
    },
    {
      row: 5, branch: 'dataviz', merges: ['climate'],
      title: 'US Energy Dashboard',
      url: 'https://us-energy-akshar.netlify.app',
      desc: 'Interactive state-by-state dashboard on US energy mix trends and each state\'s stated transition goals. Built for policymakers, journalists, and researchers to quickly locate where a state stands and where it says it is headed.',
      links: [
        { label: 'Dashboard', url: 'https://us-energy-akshar.netlify.app' },
      ]
    },
    {
      row: 6, branch: 'policy', merges: [],
      title: 'Philanthropy & Responsibilism',
      url: 'https://docs.google.com/presentation/d/17FCXrRtANxt6Ul3v6z709nXVM-omLcPBC8mwi7XGsqE/edit',
      desc: 'Survey research on charitable giving patterns among 180 Americans, funded via a pitch contest at Booth School of Business. Analyzed donation drivers, preferences for formal vs. informal giving, and donor anxieties using Qualtrics and R.',
      links: [
        { label: 'Slides', url: 'https://docs.google.com/presentation/d/17FCXrRtANxt6Ul3v6z709nXVM-omLcPBC8mwi7XGsqE/edit' },
        { label: 'Code', url: 'https://github.com/aksharkatariya/donations-philanthropies-analysis' },
      ]
    },
    {
      row: 7, branch: 'policy', merges: [],
      title: 'ESG Materiality, APA Corp.',
      url: 'https://docs.google.com/document/d/1LdWtBm02db7AclD5x235OAOnKViALAKLnluRYVaGuDM/edit',
      desc: 'Qualitative and quantitative ESG benchmarking of APA Corp., a hydrocarbon exploration company, against peers. Supervised by John Oxtoby (Ariel Investments) and Neolle Liang (Builders Vision). Analysis in R.',
      links: [
        { label: 'Report', url: 'https://docs.google.com/document/d/1LdWtBm02db7AclD5x235OAOnKViALAKLnluRYVaGuDM/edit' },
      ]
    },
    {
      row: 8, branch: 'nlp', merges: [],
      title: 'Reading Beyond the Radcliffe Line',
      url: 'https://github.com/aksharkatariya/Partition-Project',
      desc: 'Sentiment analysis and NER on five canonical books about the Partition of India, searching for textual evidence of syncretism and shared cultural memory across the divide. Lets data speak to historical questions that close reading alone cannot answer.',
      links: [
        { label: 'GitHub', url: 'https://github.com/aksharkatariya/Partition-Project' },
      ]
    },
    {
      row: 9, branch: 'dataviz', merges: ['nlp'],
      title: 'Factorial Newsletter',
      url: 'https://aksharkatariya.substack.com',
      desc: 'Bi-weekly data literacy newsletter with 300+ subscribers, bringing rigorous data storytelling to Indian readers. 20+ articles on sports analytics, NLP, civic data, and impact investing. Includes a guest author program mentoring high school students.',
      links: [
        { label: 'Newsletter', url: 'https://aksharkatariya.substack.com' },
        { label: 'Chicago Murals', url: 'https://aksharkatariya.substack.com/p/artistry-of-the-windy-city' },
        { label: 'Hamilton NLP', url: 'https://aksharkatariya.substack.com/p/hamiltongpt-exploring-the-musical' },
      ]
    },
    {
      row: 10, branch: 'chatbot', merges: ['civictech'],
      title: 'HabitByBit',
      url: 'https://habitbybit.onrender.com',
      desc: 'An SMS-based habit tracker designed for users who do not want another app. Built with Ruby on Rails and D3.js. Users self-report via text message; the app visualizes progress over time. Zero friction by design.',
      links: [
        { label: 'Website', url: 'https://habitbybit.onrender.com' },
        { label: 'Code', url: 'https://github.com/aksharkatariya/habit_by_bit' },
      ]
    },
  ];

  // ── LEGEND ──────────────────────────────────────────────
  const legend = document.getElementById('legend');
  for (const [id, label] of Object.entries(BRANCH_LABELS)) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const dot = document.createElement('div');
    dot.className = 'legend-dot';
    dot.style.background = COLORS[id];
    const txt = document.createElement('span');
    txt.textContent = label;
    item.appendChild(dot);
    item.appendChild(txt);
    legend.appendChild(item);
  }

  // ── BRANCH EXTENTS ───────────────────────────────────────
  function getExtents() {
    const ext = {};
    for (const id of Object.keys(BX)) ext[id] = { min: Infinity, max: -Infinity };
    for (const c of commits) {
      const y = START_Y + c.row * ROW_H;
      ext[c.branch].min = Math.min(ext[c.branch].min, y);
      ext[c.branch].max = Math.max(ext[c.branch].max, y);
      for (const m of c.merges) {
        ext[m].min = Math.min(ext[m].min, y);
        ext[m].max = Math.max(ext[m].max, y);
      }
    }
    return ext;
  }

  const ext = getExtents();
  const lastRow = Math.max(...commits.map(c => c.row));
  const SVG_H = START_Y + lastRow * ROW_H + 80;

  // ── SVG SETUP ────────────────────────────────────────────
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('gitgraph');
  svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);
  svg.setAttribute('width', SVG_W);
  svg.setAttribute('height', SVG_H);

  function svgEl(tag, attrs = {}) {
    const e = document.createElementNS(svgNS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  // Returns SVG path string for a merge connection.
  // Short spans = straight dash; long spans = gentle arc over intervening branches.
  function mergePath(x1, x2, y) {
    const dist = Math.abs(x2 - x1);
    if (dist <= 65) {
      return `M ${x1},${y} L ${x2},${y}`;
    }
    const rise = dist * 0.22;
    const mx = (x1 + x2) / 2;
    return `M ${x1},${y} Q ${mx},${y - rise} ${x2},${y}`;
  }

  // ── DRAW BRANCH LINES ────────────────────────────────────
  for (const [id, x] of Object.entries(BX)) {
    if (ext[id].min === Infinity) continue;
    svg.appendChild(svgEl('line', {
      x1: x, y1: ext[id].min,
      x2: x, y2: ext[id].max,
      stroke: COLORS[id],
      'stroke-width': 4,
      'stroke-linecap': 'round',
      opacity: 0.7,
    }));
  }

  // ── DRAW COMMITS ─────────────────────────────────────────
  for (let i = 0; i < commits.length; i++) {
    const c = commits[i];
    const cx = BX[c.branch];
    const cy = START_Y + c.row * ROW_H;
    const col = COLORS[c.branch];

    // Merge connection paths + hollow endpoints
    for (const m of c.merges) {
      const mx = BX[m];
      const pathD = mergePath(cx, mx, cy);

      svg.appendChild(svgEl('path', {
        d: pathD,
        fill: 'none',
        stroke: col,
        'stroke-width': 3,
        'stroke-dasharray': '4 3',
        'stroke-linecap': 'round',
        opacity: 0.8,
      }));

      // Hollow endpoint circle on the merge branch
      svg.appendChild(svgEl('circle', {
        cx: mx, cy,
        r: MERGE_R,
        fill: '#F4EEE4',
        stroke: COLORS[m],
        'stroke-width': 1.5,
      }));
    }

    // Clickable primary node group
    const g = svgEl('g');
    g.classList.add('node-group');
    g.dataset.idx = i;

    // Glow ring
    g.appendChild(svgEl('circle', {
      cx, cy, r: 11,
      fill: col, opacity: 0.1,
    }));

    // Main circle
    g.appendChild(svgEl('circle', {
      cx, cy, r: NODE_R,
      fill: col,
    }));

    // Inner white dot
    g.appendChild(svgEl('circle', {
      cx, cy, r: 2.5,
      fill: '#F4EEE4', opacity: 0.75,
    }));

    svg.appendChild(g);

    // ── TITLE LABEL (clickable, opens popup not direct link) ─────────────────
    const titleGroup = svgEl('g');
    titleGroup.classList.add('node-group');
    titleGroup.dataset.idx = i;
    titleGroup.style.cursor = 'pointer';
    
    const lines = wrapText(c.title, 30);
    const lineH = 15;
    const startTextY = cy - ((lines.length - 1) * lineH) / 2;
    
    for (let li = 0; li < lines.length; li++) {
      const t = svgEl('text', {
        x: LABEL_X,
        y: startTextY + li * lineH,
        fill: '#1A1714',
        'font-family': 'Cormorant Garamond, serif',
        'font-size': 15,
        'font-weight': 600,
      });
      t.textContent = lines[li];
      titleGroup.appendChild(t);
    }
    
    titleGroup.addEventListener('mouseenter', () => {
      titleGroup.querySelectorAll('text').forEach(t => t.setAttribute('fill', '#B94A22'));
    });
    titleGroup.addEventListener('mouseleave', () => {
      titleGroup.querySelectorAll('text').forEach(t => t.setAttribute('fill', '#1A1714'));
    });
    
    svg.appendChild(titleGroup);

    // Branch tag(s) below title
    const tagStr = [c.branch, ...c.merges].map(b => BRANCH_LABELS[b]).join(' · ');
    const tagEl = svgEl('text', {
      x: LABEL_X,
      y: startTextY + lines.length * lineH + 2,
      fill: col,
      'font-family': 'IBM Plex Mono, monospace',
      'font-size': 8,
      'letter-spacing': 0.5,
      'pointer-events': 'none',
    });
    tagEl.textContent = tagStr.toUpperCase();
    svg.appendChild(tagEl);
  }

  // ── POPUP ────────────────────────────────────────────────
  const popup   = document.getElementById('popup');
  const overlay = document.getElementById('overlay');

  svg.addEventListener('click', e => {
    const g = e.target.closest('.node-group');
    if (!g) return;
    openPopup(commits[parseInt(g.dataset.idx)]);
  });

  function openPopup(c) {
    document.getElementById('popup-dot').style.background = COLORS[c.branch];
    document.getElementById('popup-branch-text').textContent = BRANCH_LABELS[c.branch];
    document.getElementById('popup-branch-text').style.color = COLORS[c.branch];

    const titleEl = document.getElementById('popup-title');
    titleEl.textContent = c.title;
    titleEl.href = c.url;

    document.getElementById('popup-desc').textContent = c.desc;

    const linksEl = document.getElementById('popup-links');
    linksEl.innerHTML = '';
    for (const l of c.links) {
      const a = document.createElement('a');
      a.href = l.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.textContent = l.label;
      a.className = 'popup-link';
      linksEl.appendChild(a);
    }

    popup.classList.add('visible');
    overlay.classList.add('visible');
  }

  function closePopup() {
    popup.classList.remove('visible');
    overlay.classList.remove('visible');
  }

  document.getElementById('popup-close').addEventListener('click', closePopup);
  overlay.addEventListener('click', closePopup);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

  // ── TEXT WRAP UTIL ───────────────────────────────────────
  function wrapText(text, maxChars) {
    if (text.length <= maxChars) return [text];
    const words = text.split(' ');
    const lines = [];
    let cur = '';
    for (const w of words) {
      const candidate = cur ? cur + ' ' + w : w;
      if (candidate.length > maxChars) {
        if (cur) lines.push(cur);
        cur = w;
      } else {
        cur = candidate;
      }
    }
    if (cur) lines.push(cur);
    return lines;
  }
</script>
</body>
</html>
